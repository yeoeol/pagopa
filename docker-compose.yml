version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    user: "$UID:$GID"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-data:/prometheus
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    user: "$UID:$GID"
    ports:
      - "3000:3000"
    volumes:
      - ./grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitoring

  # Elasticsearch: 로그 데이터 저장 및 검색 엔진
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # 개발 환경 편의상 보안 비활성화
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # JVM 메모리 제한 (OOM 방지)
    ports:
      - "9200:9200"
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'" ]
      interval: 10s
      timeout: 10s
      retries: 5
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - efk

  # Kibana: Elasticsearch 데이터를 시각화하는 UI
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - efk

  # Fluentd: 로그 수집기 (Spring Boot에서 TCP로 로그를 받아 Elasticsearch로 전달)
  fluentd:
    build:
      context: ./fluentd
    container_name: fluentd
    ports:
      - "24224:24224"     # Spring Boot에서 로그를 쏠 TCP 포트
      - "24224:24224/udp"
    volumes:
      - ./fluentd/conf:/fluentd/etc # fluent.conf 마운트
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - efk

volumes:
  prometheus-data:
  grafana-data:
  es-data:

networks:
  monitoring:
    driver: bridge
  efk:
    driver: bridge
